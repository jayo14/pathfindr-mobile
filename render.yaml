services:
  - type: web
    name: pathfindr-backend
    env: python
    buildCommand: pip install -r requirements && python manage.py migrate
    startCommand: gunicorn app.wsgi:application
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pathfindr-db
          property: connectionString

databases:
  - name: pathfindr-db
    plan: free
